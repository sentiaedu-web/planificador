document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-weight: 700;\n  font-display: swap;\n  src: url(\"6f529e3f-4f56-4d30-9c1a-3d625e7133e3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html, body { margin: 0; padding: 0; background: #F6F4EE; }\n  * { box-sizing: border-box; }\n  input, select, button, textarea { font-family: 'Public Sans', sans-serif; }\n  input[type=\"date\"] { color-scheme: light; }\n  button { cursor: pointer; }\n<\u002Fstyle>\n<script src=\"e60c5808-5f9c-448a-9f1e-0e70755f3a2d\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n\n<div style=\"font-family:'Public Sans',sans-serif;color:#29251F;min-height:100vh;padding-bottom:48px\">\n\n  <!-- Header -->\n  <header data-screen-label=\"Cabecera\" style=\"display:flex;align-items:center;gap:14px;padding:18px 32px;border-bottom:1px solid #E5E0D3;background:#FBFAF5\">\n    <div style=\"width:36px;height:36px;border-radius:10px;background:#4A6C87;color:#F6F4EE;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px\">P<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:1px\">\n      <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;letter-spacing:-0.01em\">PlanIA CV<\u002Fdiv>\n      <div style=\"font-size:12px;color:#857D6F\">Temporalización anual · Educación Infantil y Primaria · Comunitat Valenciana<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <nav style=\"display:flex;gap:8px;align-items:center\">\n      <a href=\"base-documental.dc.html\" style=\"font-size:12.5px;font-weight:600;color:#6B6355;text-decoration:none;padding:7px 12px;border:1px solid #E5E0D3;border-radius:9px;background:#FFFFFF\">Base documental<\u002Fa>\n      <a href=\"acerca-de.dc.html\" style=\"font-size:12.5px;font-weight:600;color:#6B6355;text-decoration:none;padding:7px 12px;border:1px solid #E5E0D3;border-radius:9px;background:#FFFFFF\">Acerca de<\u002Fa>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <div data-screen-label=\"Aviso de protección de datos\" style=\"background:#E6EEF3;color:#33546A;font-size:12px;font-weight:500;text-align:center;padding:8px 32px;line-height:1.5;border-bottom:1px solid #CBDCE6\">No introduzca nombres de alumnos ni datos personales. PlanIA CV trabaja exclusivamente con información curricular y organizativa.<\u002Fdiv>\n\n  <main style=\"max-width:1480px;margin:0 auto;padding:24px 32px;display:grid;grid-template-columns:minmax(340px,380px) 1fr;gap:22px;align-items:start\">\n\n    <!-- ══════════ ASIDE: configuración ══════════ -->\n    <aside style=\"display:grid;gap:16px\">\n\n      <!-- 1 · Contexto -->\n      <section data-screen-label=\"Contexto\" style=\"background:#FFFFFF;border:1px solid #E5E0D3;border-radius:14px;padding:18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n          <div style=\"width:22px;height:22px;border-radius:7px;background:#E6EEF3;color:#4A6C87;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px\">Contexto<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;gap:10px\">\n          <div style=\"display:flex;gap:8px\">\n            <sc-for list=\"{{ etapaOpts }}\" as=\"o\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ o.on }}\" style=\"{{ o.st }}\">{{ o.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\">\n            <div>\n              <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px\">Curso / nivel<\u002Fdiv>\n              <input value=\"{{ nivel }}\" onchange=\"{{ onNivel }}\" style=\"width:100%;border:1px solid #E5E0D3;border-radius:8px;padding:7px 10px;font-size:13px;background:#FCFBF7;color:#29251F\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px\">{{ areaLabel }}<\u002Fdiv>\n              <select value=\"{{ area }}\" onchange=\"{{ onArea }}\" style=\"width:100%;border:1px solid #E5E0D3;border-radius:8px;padding:7px 10px;font-size:13px;background:#FCFBF7;color:#29251F\">\n                \n                  <option value=\"{{ o }}\">{{ o }}<\u002Foption>\n                \n              <\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ areaEsOtra }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px\">Especifica el área / materia<\u002Fdiv>\n              <input value=\"{{ areaCustom }}\" onchange=\"{{ onAreaCustom }}\" placeholder=\"Escribe el nombre del área o materia\" style=\"width:100%;border:1px solid #E5E0D3;border-radius:8px;padding:7px 10px;font-size:13px;background:#FCFBF7;color:#29251F\">\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\">\n            <div>\n              <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px\">Curso escolar<\u002Fdiv>\n              <input value=\"{{ cursoEscolar }}\" onchange=\"{{ onCursoEscolar }}\" style=\"width:100%;border:1px solid #E5E0D3;border-radius:8px;padding:7px 10px;font-size:13px;background:#FCFBF7;color:#29251F\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px\">Localidad<\u002Fdiv>\n              <input value=\"{{ localidad }}\" onchange=\"{{ onLocalidad }}\" placeholder=\"Opcional\" style=\"width:100%;border:1px solid #E5E0D3;border-radius:8px;padding:7px 10px;font-size:13px;background:#FCFBF7;color:#29251F\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 2 · Calendario -->\n      <section data-screen-label=\"Calendario\" style=\"background:#FFFFFF;border:1px solid #E5E0D3;border-radius:14px;padding:18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n          <div style=\"width:22px;height:22px;border-radius:7px;background:#E6EEF3;color:#4A6C87;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px\">Calendario<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px\">\n          <div>\n            <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px\">Inicio lectivo<\u002Fdiv>\n            <input type=\"date\" value=\"{{ inicio }}\" onchange=\"{{ onInicio }}\" style=\"width:100%;border:1px solid #E5E0D3;border-radius:8px;padding:6px 8px;font-size:12.5px;background:#FCFBF7;color:#29251F\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px\">Fin lectivo<\u002Fdiv>\n            <input type=\"date\" value=\"{{ fin }}\" onchange=\"{{ onFin }}\" style=\"width:100%;border:1px solid #E5E0D3;border-radius:8px;padding:6px 8px;font-size:12.5px;background:#FCFBF7;color:#29251F\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px\">Fin 1r trimestre<\u002Fdiv>\n            <input type=\"date\" value=\"{{ t1Fin }}\" onchange=\"{{ onT1 }}\" style=\"width:100%;border:1px solid #E5E0D3;border-radius:8px;padding:6px 8px;font-size:12.5px;background:#FCFBF7;color:#29251F\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px\">Fin 2º trimestre<\u002Fdiv>\n            <input type=\"date\" value=\"{{ t2Fin }}\" onchange=\"{{ onT2 }}\" style=\"width:100%;border:1px solid #E5E0D3;border-radius:8px;padding:6px 8px;font-size:12.5px;background:#FCFBF7;color:#29251F\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin:12px 0 6px\">Festivos y vacaciones<\u002Fdiv>\n        <div style=\"display:grid;gap:6px\">\n          <sc-for list=\"{{ festivosView }}\" as=\"f\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:1fr auto;gap:6px;background:#FCFBF7;border:1px solid #EEE9DD;border-radius:9px;padding:7px 8px\">\n              <input value=\"{{ f.label }}\" onchange=\"{{ f.onLabel }}\" style=\"border:none;background:transparent;font-size:12.5px;font-weight:600;color:#29251F;padding:0;outline:none;min-width:0\">\n              <button onclick=\"{{ f.remove }}\" title=\"Eliminar\" style=\"border:none;background:transparent;color:#B3AB9C;font-size:14px;line-height:1;padding:0 2px\">×<\u002Fbutton>\n              <div style=\"grid-column:1/-1;display:flex;gap:6px;align-items:center\">\n                <input type=\"date\" value=\"{{ f.start }}\" onchange=\"{{ f.onStart }}\" style=\"flex:1;border:1px solid #EEE9DD;border-radius:6px;padding:3px 6px;font-size:11.5px;background:#FFFFFF;color:#6B6355;min-width:0\">\n                <span style=\"color:#B3AB9C;font-size:11px\">→<\u002Fspan>\n                <input type=\"da 8px 4px\">\n              <div style=\"font-size:10.5px;font-weight:700;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase\">{{ w.label }}<\u002Fdiv>\n              <div style=\"font-size:17px;font-weight:700;font-variant-numeric:tabular-nums\">{{ w.count }}<\u002Fdiv>\n              <div style=\"display:flex;gap:4px\">\n                <button onclick=\"{{ w.dec }}\" style=\"width:20px;height:20px;border-radius:6px;border:1px solid #E5E0D3;background:#FFFFFF;color:#6B6355;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center\">−<\u002Fbutton>\n                <button onclick=\"{{ w.inc }}\" style=\"width:20px;height:20px;border-radius:6px;border:1px solid #E5E0D3;background:#FFFFFF;color:#6B6355;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center\">+<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px\">\n          <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase\">Duración de sesión<\u002Fdiv>\n          <select value=\"{{ duracion }}\" onchange=\"{{ onDuracion }}\" style=\"border:1px solid #E5E0D3;border-radius:8px;padding:6px 8px;font-size:12.5px;background:#FCFBF7;color:#29251F\">\n            <option value=\"45\">45 min<\u002Foption>\n            <option value=\"50\">50 min<\u002Foption>\n            <option value=\"60\">60 min<\u002Foption>\n            <option value=\"90\">90 min<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Faside>\n\n    <!-- ══════════ MAIN: resultados ══════════ -->\n    <div style=\"display:grid;gap:16px\">\n\n      <!-- Resumen -->\n      <section data-screen-label=\"Resumen de sesiones\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px\">\n        <div style=\"background:#FFFFFF;border:1px solid #E5E0D3;border-radius:14px;padding:16px 18px\">\n          <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase\">Días lectivos<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums\">{{ diasLectivos }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #E5E0D3;border-radius:14px;padding:16px 18px\">\n          <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase\">Sesiones teóricas<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums\">{{ teoricas }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #E5E0D3;border-radius:14px;padding:16px 18px\">\n          <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase\">{{ perdidasLabel }}<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums\">{{ evSesiones }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#29251F;border:1px solid #29251F;border-radius:14px;padding:16px 18px;color:#F6F4EE\">\n          <div style=\"font-size:11px;font-weight:600;color:#B3AB9C;letter-spacing:0.05em;text-transform:uppercase\">Sesiones disponibles<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums\">{{ disponibles }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- Alertas -->\n      <sc-if value=\"{{ hasAlerts }}\" hint-placeholder-val=\"{{ true }}\">\n        <section data-screen-label=\"Detector de incoherencias\" style=\"display:grid;gap:8px\">\n          <sc-for list=\"{{ alerts }}\" as=\"a\" hint-placeholder-count=\"1\">\n            <div style=\"{{ a.st }}\">{{ a.text }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- Trimestres -->\n      <section data-screen-label=\"Distribución trimestral\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n        <sc-for list=\"{{ trimsView }}\" as=\"t\" hint-placeholder-count=\"3\">\n          <div style=\"background:#FFFFFF;border:1px solid #E5E0D3;border-radius:14px;padding:16px 18px;display:grid;gap:8px\">\n            <div style=\"display:flex;align-items:center;gap:8px\">\n              <div style=\"width:9px;height:9px;border-radius:3px;background:{{ t.color }}\"><\u002Fdiv>\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:14.5px\">{{ t.nombre }}<\u002Fdiv>\n              <div style=\"flex:1\"><\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#857D6F\">{{ t.rango }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:6px\">\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:700;font-variant-numeric:tabular-nums\">{{ t.disponibles }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#857D6F\">sesiones · {{ t.dias }} días lectivos<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;gap:4px\">\n              <div style=\"height:6px;border-radius:4px;background:#F1EEE5;overflow:hidden\">\n                <div style=\"height:100%;border-radius:4px;background:{{ t.color }};width:{{ t.pct }}%\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#857D6F\">{{ t.asignadas }} asignadas a SdA<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n\n      <!-- SdA -->\n      <section data-screen-label=\"Situaciones de aprendizaje\" style=\"background:#FFFFFF;border:1px solid #E5E0D3;border-radius:14px;padding:18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16px\">Situaciones de aprendizaje<\u002Fdiv>\n          <div style=\"flex:1\"><\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#857D6F\"><span style=\"font-weight:700;color:#29251F\">{{ totalSdA }}<\u002Fspan> de {{ disponibles }} sesiones asignadas<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;gap:8px\">\n          <sc-for list=\"{{ sdasView }}\" as=\"s\" hint-placeholder-count=\"6\">\n            <div style=\"border:1px solid #EEE9DD;border-radius:11px;padding:10px 12px;background:#FCFBF7;display:grid;gap:6px;border-left:4px solid {{ s.color }}\">\n              <div style=\"display:flex;align-items:center;gap:10px\">\n                <div style=\"display:flex;flex-direction:column;gap:2px;flex-shrink:0\">\n                  <button onclick=\"{{ s.moveUp }}\" title=\"Subir\" style=\"{{ s.upSt }}\">▲<\u002Fbutton>\n                  <button onclick=\"{{ s.moveDown }}\" title=\"Bajar\" style=\"{{ s.downSt }}\">▼<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"width:26px;height:26px;border-radius:8px;background:{{ s.color }};color:#33302A;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-variant-numeric:tabular-nums\">{{ s.n }}<\u002Fdiv>\n                <input value=\"{{ s.titulo }}\" onchange=\"{{ s.onTitulo }}\" placeholder=\"Escribe el nombre de la SdA\" style=\"flex:1;border:none;background:transparent;font-size:13.5px;font-weight:600;color:#29251F;padding:0;outline:none;min-width:0\">\n                <div style=\"display:flex;align-items:center;gap:5px;flex-shrink:0\">\n                  <button onclick=\"{{ s.dec }}\" style=\"width:22px;height:22px;border-radius:6px;border:1px solid #E5E0D3;background:#FFFFFF;color:#6B6355;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center\">−<\u002Fbutton>\n                  <div style=\"min-width:24px;text-align:center;font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums\">{{ s.sesiones }}<\u002Fdiv>\n                  <button onclick=\"{{ s.inc }}\" style=\"width:22px;height:22px;border-radius:6px;border:1px solid #E5E0D3;background:#FFFFFF;color:#6B6355;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center\">+<\u002Fbutton>\n                  <div style=\"font-size:11.5px;color:#857D6F;margin-right:4px\">ses.<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:20px;flex-shrink:0;{{ s.chipSt }}\">{{ s.rango }} · {{ s.trimLabel }}<\u002Fdiv>\n                <button onclick=\"{{ s.remove }}\" title=\"Eliminar SdA\" style=\"border:none;background:transparent;color:#B3AB9C;font-size:15px;line-height:1;padding:0 2px;flex-shrink:0\">×<\u002Fbutton>\n              <\u002Fdiv>\n              <sc-if value=\"{{ s.hasWarn }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:11.5px;color:#8F2F23;padding-left:36px\">⚠ {{ s.warn }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ addSda }}\" style=\"margin-top:10px;width:100%;border:1px dashed #D8D2C2;border-radius:10px;background:transparent;color:#857D6F;font-size:13px;font-weight:600;padding:9px\">+ Añadir situación de aprendizaje<\u002Fbutton>\n        <div style=\"margin-top:14px;display:grid;gap:5px\">\n          <div style=\"height:8px;border-radius:5px;background:#F1EEE5;overflow:hidden\">\n            <div style=\"height:100%;border-radius:5px;background:{{ progresoColor }};width:{{ progresoPct }}%\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;color:#857D6F\">{{ progresoTexto }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- Calendario anual -->\n      <sc-if value=\"{{ showCal }}\" hint-placeholder-val=\"{{ true }}\">\n        <section data-screen-label=\"Calendario anual\" style=\"background:#FFFFFF;border:1px solid #E5E0D3;border-radius:14px;padding:18px\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16px\">Calendario anual<\u002Fdiv>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:5px;font-size:11.5px;color:#857D6F\"><span style=\"width:10px;height:10px;border-radius:3px;background:#FFFFFF;border:1px solid #D8D2C2;display:inline-block\"><\u002Fspan> Lectivo<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:5px;font-size:11.5px;color:#857D6F\"><span style=\"width:10px;height:10px;border-radius:3px;background:#D64B3F;display:inline-block\"><\u002Fspan> Festivo<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:5px;font-size:11.5px;color:#857D6F\"><span style=\"width:10px;height:10px;border-radius:3px;background:#2E8B57;display:inline-block\"><\u002Fspan> Actividad de centro<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px\">\n            <sc-for list=\"{{ months }}\" as=\"m\" hint-placeholder-count=\"10\">\n              <div style=\"border:1px solid #EEE9DD;border-radius:11px;padding:10px\">\n                <div style=\"font-size:12px;font-weight:700;color:#6B6355;margin-bottom:7px;text-transform:capitalize\">{{ m.label }}<\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:2px\">\n                  <sc-for list=\"{{ m.cells }}\" as=\"c\" hint-placeholder-count=\"35\">\n                    <div style=\"{{ c.st }}\">{{ c.d }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;padding-top:14px;border-top:1px solid #EEE9DD\">\n            <div style=\"font-size:11px;font-weight:600;color:#857D6F;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px\">Situaciones de aprendizaje en el calendario<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:6px 16px\">\n              <sc-for list=\"{{ calLegend }}\" as=\"lg\" hint-placeholder-count=\"6\">\n                <div style=\"{{ lg.st }}\"><span style=\"width:12px;height:12px;border-radius:4px;flex-shrink:0;background:{{ lg.color }}\"><\u002Fspan> {{ lg.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- Normativa utilizada + exportación -->\n      <section data-screen-label=\"Normativa y exportación\" style=\"background:#FFFFFF;border:1px solid #E5E0D3;border-radius:14px;padding:18px;display:grid;gap:16px\">\n        <div style=\"display:grid;gap:10px\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16px\">Normativa utilizada<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n            <sc-for list=\"{{ normativaView }}\" as=\"d\" hint-placeholder-count=\"3\">\n              <div style=\"{{ d.st }}\"><span style=\"font-weight:700\">{{ d.mark }}<\u002Fspan> {{ d.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#857D6F;line-height:1.5\">Se marca automáticamente la normativa que consta como consultada en la Base documental. Cuando una respuesta se apoya en normativa, PlanIA CV la cita y no inventa disposiciones no cargadas.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid #EEE9DD;padding-top:14px;display:grid;gap:10px\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16px\">Exportar<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n            <button onclick=\"{{ onWord }}\" style=\"display:flex;align-items:center;gap:7px;border:1px solid #2B579A;background:#2B579A;color:#FFFFFF;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600\">📄 Exportar Word<\u002Fbutton>\n            <button onclick=\"{{ onExcel }}\" style=\"display:flex;align-items:center;gap:7px;border:1px solid #217346;background:#217346;color:#FFFFFF;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600\">📊 Exportar Excel<\u002Fbutton>\n            <button onclick=\"{{ onTextoProg }}\" style=\"display:flex;align-items:center;gap:7px;border:1px solid #29251F;background:#FFFFFF;color:#29251F;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600\">📘 Generar texto para Programación Anual<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#857D6F;line-height:1.5\">{{ exportStatus }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- Texto para la programación -->\n      <sc-if value=\"{{ showTexto }}\" hint-placeholder-val=\"{{ true }}\">\n        <section data-screen-label=\"Texto para la programación\" style=\"background:#FFFFFF;border:1px solid #E5E0D3;border-radius:14px;padding:18px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16px\">Texto para la Programación Anual<\u002Fdiv>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <button onclick=\"{{ onCopy }}\" style=\"border:1px solid #29251F;background:#29251F;color:#F6F4EE;border-radius:9px;padding:7px 14px;font-size:12.5px;font-weight:600\">{{ copiarLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n          <pre style=\"margin:0;white-space:pre-wrap;font-family:'Public Sans',sans-serif;font-size:12.5px;line-height:1.65;color:#4A443A;background:#FCFBF7;border:1px solid #EEE9DD;border-radius:11px;padding:14px 16px\">{{ textoProg }}<\u002Fpre>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <div style=\"font-size:11.5px;color:#B3AB9C;text-align:center;line-height:1.5\">PlanIA CV apoya la toma de decisiones pedagógicas; no sustituye el criterio profesional docente.<br>Contrasta fechas y cómputos con la normativa vigente y las resoluciones oficiales de la Conselleria.<\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <footer style=\"max-width:1480px;margin:24px auto 0;padding:18px 32px 0;border-top:1px solid #E5E0D3;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap\">\n    <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:13px;color:#29251F\">PlanIA CV<\u002Fdiv>\n    <div style=\"font-size:12px;color:#857D6F\">Creado por David Martínez López · 2026<\u002Fdiv>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <div style=\"font-size:12px;color:#4A6C87;font-style:italic\">Proyecto Sentia: Sentir, enseñar, transformar<\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;mostrarCalendario&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Vista&quot; },\n  &quot;mostrarTextoProgramacion&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Vista&quot; },\n  &quot;umbralReserva&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 10, &quot;min&quot;: 5, &quot;max&quot;: 25, &quot;step&quot;: 1, &quot;unit&quot;: &quot;%&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Comprobaciones&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    etapa: 'primaria',\n    nivel: '3º de Primaria',\n    area: 'Matemáticas',\n    areaCustom: '',\n    localidad: '',\n    cursoEscolar: '2026-2027',\n    inicio: '2026-09-10',\n    fin: '2027-06-18',\n    t1Fin: '2026-12-22',\n    t2Fin: '2027-03-24',\n    festivos: [\n      { id: 1, label: 'Dia de la Comunitat Valenciana', start: '2026-10-09', end: '2026-10-09' },\n      { id: 2, label: 'Fiesta Nacional', start: '2026-10-12', end: '2026-10-12' },\n      { id: 3, label: 'Puente de diciembre', start: '2026-12-07', end: '2026-12-08' },\n      { id: 4, label: 'Vacaciones de Navidad', start: '2026-12-23', end: '2027-01-06' },\n      { id: 5, label: 'Vacaciones de Pascua', start: '2027-03-25', end: '2027-04-05' }\n    ],\n    eventos: [\n      { id: 1, date: '2026-11-27', label: 'Jornada deportiva' },\n      { id: 2, date: '2027-04-23', label: 'Día del libro · actividades de centro' }\n    ],\n    gestion: 'descontar',\n    sesionesDia: { 1: 1, 2: 1, 3: 1, 4: 0, 5: 1 },\n    duracion: 45,\n    sdas: [\n      { id: 1, titulo: 'Números hasta el 10.000', sesiones: 16 },\n      { id: 2, titulo: 'Suma y resta con estrategias de cálculo', sesiones: 12 },\n      { id: 3, titulo: 'Geometría en el patio', sesiones: 12 },\n      { id: 4, titulo: 'La multiplicación', sesiones: 16 },\n      { id: 5, titulo: 'Medida: longitud y masa', sesiones: 14 },\n      { id: 6, titulo: 'La división y el reparto', sesiones: 16 },\n      { id: 7, titulo: 'Tiempo y dinero', sesiones: 12 },\n      { id: 8, titulo: 'Fracciones en la cocina', sesiones: 14 },\n      { id: 9, titulo: 'Datos, azar y probabilidad', sesiones: 14 }\n    ],\n    copied: false,\n    exportStatus: 'Los archivos incluyen automáticamente la autoría: David Martínez López · Proyecto Sentia.',\n    normativa: { d106: true, d96: true, cal: true },\n    centro: []\n  };\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem('planiacv_normativa');\n      if (raw) this.setState({ normativa: { ...this.state.normativa, ...JSON.parse(raw) } });\n      const rc = localStorage.getItem('planiacv_centro');\n      if (rc) this.setState({ centro: JSON.parse(rc) });\n    } catch (e) {}\n    this._onStorage = e => {\n      if (e.key === 'planiacv_normativa' && e.newValue) {\n        try { this.setState({ normativa: JSON.parse(e.newValue) }); } catch (err) {}\n      }\n      if (e.key === 'planiacv_centro' && e.newValue) {\n        try { this.setState({ centro: JSON.parse(e.newValue) }); } catch (err) {}\n      }\n    };\n    window.addEventListener('storage', this._onStorage);\n  }\n  componentWillUnmount() { if (this._onStorage) window.removeEventListener('storage', this._onStorage); }\n\n  _download(blob, filename) {\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = filename;\n    document.body.appendChild(a); a.click();\n    document.body.removeChild(a);\n    setTimeout(() => URL.revokeObjectURL(url), 2000);\n  }\n\n  AREAS_INFANTIL = ['Crecimiento en armonía', 'Descubrimiento y exploración del entorno', 'Comunicación y representación de la realidad', 'Otra (especificar)'];\n  AREAS_PRIMARIA = ['Lengua Castellana y Literatura', 'Valencià: Llengua i Literatura', 'Matemáticas', 'Conocimiento del Medio Natural, Social y Cultural', 'Primera Lengua Extranjera (Inglés)', 'Segunda Lengua Extranjera', 'Educación Física', 'Educación Artística: Plástica, Visual y Audiovisual', 'Educación Artística: Música y Danza', 'Educación en Valores Cívicos y Éticos', 'Religión', 'Otra (especificar)'];\n  areasFor(etapa) { return etapa === 'infantil' ? this.AREAS_INFANTIL : this.AREAS_PRIMARIA; }\n  setEtapa(etapa) { return () => this.setState(s => s.etapa === etapa ? {} : { etapa, area: this.areasFor(etapa)[0] }); }\n\n  _uid() { this._n = (this._n || 100) + 1; return this._n; }\n  parse(s) { const p = (s || '').split('-').map(Number); return new Date(p[0], (p[1] || 1) - 1, p[2] || 1); }\n  iso(d) { const z = n => String(n).padStart(2, '0'); return d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate()); }\n  fmt(s) { if (!s) return '—'; const M = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']; const d = this.parse(s); if (isNaN(d)) return '—'; return d.getDate() + ' ' + M[d.getMonth()]; }\n  set(k) { return e => this.setState({ [k]: e.target.value }); }\n  upd(list, id, k) { return e => { const v = e.target.value; this.setState(s => ({ [list]: s[list].map(x => x.id === id ? { ...x, [k]: v } : x) })); }; }\n  del(list, id) { return () => this.setState(s => ({ [list]: s[list].filter(x => x.id !== id) })); }\n\n  renderVals() {\n    const st = this.state;\n    const showCal = this.props.mostrarCalendario ?? true;\n    const showTexto = this.props.mostrarTextoProgramacion ?? true;\n    const umbral = this.props.umbralReserva ?? 10;\n    const MS = 86400000;\n\n    // ── Festivos → set de días\n    const festivoSet = new Set();\n    st.festivos.forEach(f => {\n      let a = this.parse(f.start), b = this.parse(f.end || f.start);\n      if (isNaN(a) || isNaN(b)) return;\n      let g = 0;\n      while (a <= b && g++ < 120) { festivoSet.add(this.iso(a)); a = new Date(a.getTime() + MS); }\n    });\n    const eventoMap = new Map();\n    st.eventos.forEach(ev => { if (ev.date) eventoMap.set(ev.date, ev.label || 'Actividad'); });\n    const descontar = st.gestion === 'descontar';\n\n    // ── Días lectivos\n    const days = [];\n    let d = this.parse(st.inicio); const endD = this.parse(st.fin); let g = 0;\n    if (!isNaN(d) && !isNaN(endD)) {\n      while (d <= endD && g++ < 430) {\n        const dow = d.getDay(); const key = this.iso(d);\n        if (dow >= 1 && dow <= 5 && !festivoSet.has(key)) {\n          days.push({ key, n: Number(st.sesionesDia[dow]) || 0, ev: eventoMap.get(key) });\n        }\n        d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);\n      }\n    }\n    const trimOf = k => k <= st.t1Fin ? 0 : (k <= st.t2Fin ? 1 : 2);\n    const trims = [0, 1, 2].map(() => ({ dias: 0, teoricas: 0, perdidas: 0, asignadas: 0 }));\n    let teoricas = 0, evSesiones = 0;\n    const timeline = [];\n    days.forEach(day => {\n      const t = trims[trimOf(day.key)];\n      t.dias++; teoricas += day.n; t.teoricas += day.n;\n      if (day.ev) evSesiones += day.n;\n      if (day.ev && descontar) { t.perdidas += day.n; }\n      else { for (let i = 0; i < day.n; i++) timeline.push(day.key); }\n    });\n    const disponibles = timeline.length;\n    const perdidas = descontar ? evSesiones : 0;\n\n    // ── SdA\n    const TN = ['1r trimestre', '2º trimestre', '3r trimestre'];\n    const TS = ['T1', 'T2', 'T3'];\n    const SDA_COLORS = ['#BBD3F0', '#C6E3D4', '#F3D9B8', '#E6C9E0', '#CFE4B4', '#F2C6C0', '#BFE0E4', '#DED3B6', '#E9CBA0', '#CFCFEE', '#B8D8CE', '#EBCFDE'];\n    const SDA_INK = '#33302A';\n    const dayColor = {};           // day key -> SdA bg color (para el calendario)\n    const daySda = {};             // day key -> etiqueta de SdA\n    let cur = 0, anyLong = false, anyShort = false, overflow = false;\n    const total = st.sdas.length;\n    const move = (id, dir) => () => this.setState(t => {\n      const arr = t.sdas.slice();\n      const idx = arr.findIndex(x => x.id === id);\n      const j = idx + dir;\n      if (idx < 0 || j < 0 || j >= arr.length) return {};\n      const tmp = arr[idx]; arr[idx] = arr[j]; arr[j] = tmp;\n      return { sdas: arr };\n    });\n    const sdasView = st.sdas.map((s, i) => {\n      const n = Math.max(0, Number(s.sesiones) || 0);\n      const color = SDA_COLORS[i % SDA_COLORS.length];\n      const a = cur, b = cur + n - 1; cur += n;\n      let rango = '—', trimLabel = '', over = false;\n      if (n > 0 && a < timeline.length) {\n        const bi = Math.min(b, timeline.length - 1);\n        const k1 = timeline[a], k2 = timeline[bi];\n        rango = this.fmt(k1) + ' – ' + this.fmt(k2);\n        const ta = trimOf(k1), tb = trimOf(k2);\n        trimLabel = ta === tb ? TS[ta] : TS[ta] + '–' + TS[tb];\n        for (let j = a; j <= bi; j++) { trims[trimOf(timeline[j])].asignadas++; if (dayColor[timeline[j]] === undefined) { dayColor[timeline[j]] = color; daySda[timeline[j]] = 'SdA ' + (i + 1) + '. ' + (s.titulo || ''); } }\n        if (b >= timeline.length) { over = true; overflow = true; }\n      } else if (n > 0) { over = true; overflow = true; rango = 'sin sesiones'; trimLabel = '—'; }\n      const isLong = n > 20, isShort = n > 0 && n < 4;\n      if (isLong) anyLong = true; if (isShort) anyShort = true;\n      return {\n        id: s.id, n: i + 1, titulo: s.titulo, sesiones: n, color, rango, trimLabel,\n        onTitulo: this.upd('sdas', s.id, 'titulo'),\n        inc: () => this.setState(t => ({ sdas: t.sdas.map(x => x.id === s.id ? { ...x, sesiones: (Number(x.sesiones) || 0) + 1 } : x) })),\n        dec: () => this.setState(t => ({ sdas: t.sdas.map(x => x.id === s.id ? { ...x, sesiones: Math.max(0, (Number(x.sesiones) || 0) - 1) } : x) })),\n        remove: this.del('sdas', s.id),\n        moveUp: move(s.id, -1), moveDown: move(s.id, 1),\n        canUp: i > 0, canDown: i < total - 1,\n        upSt: 'width:22px;height:20px;border-radius:6px;border:1px solid #E5E0D3;font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;' + (i > 0 ? 'background:#FFFFFF;color:#6B6355;cursor:pointer' : 'background:#F4F2EC;color:#D8D2C2;cursor:default'),\n        downSt: 'width:22px;height:20px;border-radius:6px;border:1px solid #E5E0D3;font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;' + (i < total - 1 ? 'background:#FFFFFF;color:#6B6355;cursor:pointer' : 'background:#F4F2EC;color:#D8D2C2;cursor:default'),\n        chipSt: over ? 'background:#F7E7E4;color:#8F2F23' : 'background:#F1EEE5;color:#6B6355',\n        hasWarn: isLong || isShort || over,\n        warn: over ? 'No cabe en el calendario disponible' : (isLong ? 'SdA muy larga (más de 20 sesiones): valora dividirla' : 'SdA muy corta (menos de 4 sesiones): valora fusionarla')\n      };\n    });\n    const totalSdA = cur;\n    const reserva = disponibles - totalSdA;\n\n    // ── Alertas\n    const alerts = [];\n    const base = 'border-radius:11px;padding:11px 14px;font-size:13px;font-weight:500;line-height:1.5;';\n    const stErr = base + 'background:#F7E7E4;color:#8F2F23;border:1px solid #EACFC9';\n    const stWarn = base + 'background:#F6EEDC;color:#7A5414;border:1px solid #E9DBBB';\n    const stInfo = base + 'background:#E9F0EB;color:#2F5B4A;border:1px solid #D0DFD5';\n    if (disponibles === 0) alerts.push({ st: stErr, text: 'No hay sesiones disponibles: revisa las fechas de inicio y fin y el horario semanal.' });\n    if (reserva < 0) alerts.push({ st: stErr, text: 'Exceso de sesiones: las SdA suman ' + totalSdA + ' pero solo hay ' + disponibles + ' disponibles (' + (-reserva) + ' de más). Reduce sesiones o replantea alguna SdA.' });\n    else if (disponibles > 0 && reserva > disponibles * umbral / 100) alerts.push({ st: stWarn, text: 'Déficit de planificación: quedan ' + reserva + ' sesiones sin asignar (más del ' + umbral + '% del total). Amplía alguna SdA o añade sesiones de repaso y evaluación.' });\n    else if (reserva > 0) alerts.push({ st: stInfo, text: reserva + ' sesiones en reserva para imprevistos: un margen razonable y defendible.' });\n    if (anyLong) alerts.push({ st: stWarn, text: 'Hay SdA de más de 20 sesiones: son difíciles de sostener; valora dividirlas.' });\n    if (anyShort) alerts.push({ st: stWarn, text: 'Hay SdA de menos de 4 sesiones: valora fusionarlas con otras.' });\n    const dispT = trims.map(t => t.teoricas - t.perdidas);\n    const mx = Math.max(...dispT), mn = Math.min(...dispT);\n    if (mn > 0 && mx / mn > 1.6) alerts.push({ st: stWarn, text: 'Trimestres desequilibrados: el más largo tiene ' + mx + ' sesiones y el más corto ' + mn + '. Revisa los cortes de trimestre o compensa la carga de SdA.' });\n\n    // ── Trimestres (vista)\n    const addDay = s => { const x = this.pa style=\"display:inline-block;width:10pt;height:10pt;background:#2E8B57\"><\u002Fspan> Actividad de centro<\u002Fp>' +\n          '<table class=\"data\" style=\"margin-top:6pt\"><tr><th>Color<\u002Fth><th>Situación de aprendizaje<\u002Fth><th>Periodo<\u002Fth><\u002Ftr>' + zebra(legendRows) + '<\u002Ftable>'\n        : '';\n      // Chips de normativa / documentos citados\n      const chip = (txt, gris) => '<span style=\"display:inline-block;padding:3pt 9pt;margin:0 4pt 4pt 0;border-radius:20pt;font-size:9pt;' + (gris ? 'background:#EEEBE3;color:#888;border:0.75pt solid #DED9CB' : 'background:#E9F0EB;color:#2F5B4A;border:0.75pt solid #D0DFD5') + '\">' + esc(txt) + '<\u002Fspan>';\n      const chipsHtml = '<h2>Normativa y documentos citados<\u002Fh2><p style=\"margin:0\">' + (normativaCitada.length ? normativaCitada.map(n => chip(n, false)).join('') : chip('Sin documentos ni normativa cargados', true)) + '<\u002Fp>';\n      // Portada de marca\n      const cover =\n        '<div class=\"cover\">' +\n        '<table class=\"plain\" style=\"width:auto;margin:0 auto 14pt\"><tr><td style=\"border:none;background:#4A6C87;color:#F6F4EE;width:54pt;height:54pt;text-align:center;font-size:34pt;font-weight:bold;font-family:Georgia,serif;border-radius:12pt\">P<\u002Ftd><\u002Ftr><\u002Ftable>' +\n        '<p style=\"color:#4A6C87;font-size:10pt;letter-spacing:1pt;text-transform:uppercase;margin:0 0 10pt;font-weight:bold\">PlanIA CV · Proyecto Sentia<\u002Fp>' +\n        '<h1 style=\"font-size:26pt;margin:0 0 10pt\">Temporalización Anual<\u002Fh1>' +\n        '<p style=\"font-size:14pt;margin:0 0 4pt\">' + esc(tituloDoc) + '<\u002Fp>' +\n        '<p class=\"sub\" style=\"margin:0 0 2pt\">Comunitat Valenciana' + (st.localidad ? ' · ' + esc(st.localidad) : '') + '<\u002Fp>' +\n        '<p class=\"sub\" style=\"margin:2pt 0 0\">Generado el ' + esc(fechaGen) + '<\u002Fp>' +\n        '<\u002Fdiv>';\n      const html =\n        '<html xmlns:o=\"urn:schemas-microsoft-com:office:office\" xmlns:w=\"urn:schemas-microsoft-com:office:word\"><head><meta charset=\"utf-8\"><style>' +\n        'body{font-family:Calibri,Arial,sans-serif;color:#222;font-size:11pt} h1{font-size:20pt;color:#4A6C87;margin:0 0 4pt} h2{font-size:13pt;color:#29251F;border-left:4pt solid #4A6C87;padding:2pt 0 2pt 8pt;margin:18pt 0 6pt} .sub{color:#666;font-size:10pt} table{border-collapse:collapse;width:100%;font-size:10pt} th,td{border:1px solid #bbb;padding:5pt 7pt} th{background:#4A6C87;color:#FFFFFF;text-align:left} table.plain td{border:none} .cover{text-align:center;margin:40pt 0 60pt} .foot{color:#888;font-size:9pt;margin-top:24pt;border-top:1px solid #ccc;padding-top:6pt}' +\n        '<\u002Fstyle><\u002Fhead><body>' +\n        cover +\n        '<h2>Resumen<\u002Fh2><p>Horario: <b>' + semanal + '<\u002Fb> sesiones semanales de ' + st.duracion + ' minutos. Días lectivos: <b>' + days.length + '<\u002Fb>. Sesiones teóricas: <b>' + teoricas + '<\u002Fb>. ' + (descontar ? 'Descontadas por actividades: <b>' + perdidas + '<\u002Fb>. ' : '') + 'Sesiones disponibles: <b>' + disponibles + '<\u002Fb>. Asignadas a SdA: <b>' + totalSdA + '<\u002Fb>. Reserva: <b>' + Math.max(0, reserva) + '<\u002Fb>.<\u002Fp>' +\n        '<h2>Distribución trimestral<\u002Fh2><table class=\"data\"><tr><th>Trimestre<\u002Fth><th>Periodo<\u002Fth><th>Días<\u002Fth><th>Disponibles<\u002Fth><th>Asignadas<\u002Fth><\u002Ftr>' + zebra(rowsTrim) + '<\u002Ftable>' +\n        '<h2>Temporalización — Situaciones de Aprendizaje<\u002Fh2><table class=\"data\"><tr><th><\u002Fth><th>Nº<\u002Fth><th>Situación de aprendizaje<\u002Fth><th>Sesiones<\u002Fth><th>Periodo<\u002Fth><th>Trim.<\u002Fth><\u002Ftr>' + zebra(rowsSda) + '<\u002Ftable>' +\n        calHtml +\n        '<h2>Observaciones<\u002Fh2><p>' + esc(obsTexto) + '<\u002Fp>' +\n        chipsHtml +\n        '<p class=\"foot\">Documento generado con PlanIA CV. ' + esc(autoria) + '. La herramienta no sustituye la normativa oficial ni el criterio profesional docente.<\u002Fp>' +\n        '<\u002Fbody><\u002Fhtml>';\n      this._download(new Blob(['\\ufeff' + html], { type: 'application/msword' }), 'Temporalizacion_' + areaEfectiva.replace(/\\s+/g, '_') + '.doc');\n      this.setState({ exportStatus: 'Word generado: ' + areaEfectiva + ' · ' + st.nivel + '. Autoría incluida.' });\n    };\n\n    // ── Exportar Excel (XLSX)\n    const onExcel = () => {\n      if (typeof XLSX === 'undefined') { this.setState({ exportStatus: 'La librería de exportación aún se está cargando; inténtalo de nuevo en un momento.' }); return; }\n      const wb = XLSX.utils.book_new();\n      const s1 = XLSX.utils.aoa_to_sheet([\n        ['PlanIA CV · Temporalización Anual'], [tituloDoc], ['Comunitat Valenciana' + (st.localidad ? ' · ' + st.localidad : '')], ['Generado el ' + fechaGen], [''],\n        ['Sesiones semanales', semanal], ['Duración (min)', st.duracion], ['Días lectivos', days.length],\n        ['Sesiones teóricas', teoricas], [descontar ? 'Sesiones descontadas' : 'Sesiones integradas', evSesiones],\n        ['Sesiones disponibles', disponibles], ['Asignadas a SdA', totalSdA], ['Reserva', Math.max(0, reserva)],\n        ['', ''], ['Autoría', autoria]\n      ]);\n      s1['!cols'] = [{ wch: 26 }, { wch: 44 }];\n      // Combinar (merge) las 4 líneas de cabecera a lo ancho (columnas A–B)\n      s1['!merges'] = [\n        { s: { r: 0, c: 0 }, e: { r: 0, c: 1 } },\n        { s: { r: 1, c: 0 }, e: { r: 1, c: 1 } },\n        { s: { r: 2, c: 0 }, e: { r: 2, c: 1 } },\n        { s: { r: 3, c: 0 }, e: { r: 3, c: 1 } },\n        { s: { r: 14, c: 1 }, e: { r: 14, c: 1 } }\n      ];\n      XLSX.utils.book_append_sheet(wb, s1, 'Resumen');\n\n      const DOW = ['dom','lun','mar','mié','jue','vie','sáb'];\n      const calAoa = [['Fecha', 'Día', 'Sesiones', 'Estado', 'Situación de aprendizaje']];\n      days.forEach(day => { const dt = this.parse(day.key); calAoa.push([day.key, DOW[dt.getDay()], day.n, day.ev ? 'Actividad: ' + day.ev : 'Lectivo', daySda[day.key] || '']); });\n      const s2 = XLSX.utils.aoa_to_sheet(calAoa); s2['!cols'] = [{ wch: 12 }, { wch: 6 }, { wch: 9 }, { wch: 22 }, { wch: 38 }];\n      s2['!autofilter'] = { ref: 'A1:E' + calAoa.length };\n      XLSX.utils.book_append_sheet(wb, s2, 'Calendario');\n\n      const tempAoa = [['Nº', 'Situación de aprendizaje', 'Sesiones', 'Periodo', 'Trimestre']];\n      sdasView.forEach(s => tempAoa.push([s.n, s.titulo, s.sesiones, s.rango, s.trimLabel]));\n      const s3 = XLSX.utils.aoa_to_sheet(tempAoa); s3['!cols'] = [{ wch: 5 }, { wch: 40 }, { wch: 10 }, { wch: 20 }, { wch: 10 }];\n      s3['!autofilter'] = { ref: 'A1:E' + tempAoa.length };\n      XLSX.utils.book_append_sheet(wb, s3, 'Temporalización');\n\n      const trimAoa = [['Trimestre', 'Periodo', 'Días lectivos', 'Disponibles', 'Asignadas']];\n      trimsView.forEach(t => trimAoa.push([t.nombre, t.rango, t.dias, t.disponibles, t.asignadas]));\n      const s4 = XLSX.utils.aoa_to_sheet(trimAoa); s4['!cols'] = [{ wch: 16 }, { wch: 22 }, { wch: 13 }, { wch: 12 }, { wch: 11 }];\n      XLSX.utils.book_append_sheet(wb, s4, 'Distribución trimestral');\n\n      const obsRows = [['Observaciones'], [obsTexto], [''], ['Normativa y documentos citados']];\n      if (normativaCitada.length) normativaCitada.forEach(n => obsRows.push(['· ' + n]));\n      else obsRows.push(['· Sin documentos ni normativa cargados']);\n      obsRows.push(['']); obsRows.push(['Autoría', autoria]);\n      const s5 = XLSX.utils.aoa_to_sheet(obsRows); s5['!cols'] = [{ wch: 30 }, { wch: 60 }];\n      XLSX.utils.book_append_sheet(wb, s5, 'Observaciones');\n\n      XLSX.writeFile(wb, 'Temporalizacion_' + areaEfectiva.replace(/\\s+/g, '_') + '.xlsx');\n      this.setState({ exportStatus: 'Excel generado con 5 hojas: Resumen, Calendario, Temporalización, Distribución trimestral y Observaciones.' });\n    };\n\n    const onTextoProg = () => {\n      try { navigator.clipboard.writeText(textoProg); } catch (e) {}\n      this.setState({ exportStatus: 'Texto para la Programación Anual generado y copiado al portapapeles. Disponible más abajo para revisión.' });\n    };\n\n    // ── Progreso\n    const progresoPct = disponibles > 0 ? Math.min(100, Math.round(totalSdA / disponibles * 100)) : 0;\n    const progresoColor = reserva < 0 ? '#8F2F23' : '#4A6C87';\n    const progresoTexto = reserva >= 0\n      ? totalSdA + ' de ' + disponibles + ' sesiones asignadas · ' + reserva + ' en reserva'\n      : totalSdA + ' asignadas sobre ' + disponibles + ' disponibles · ' + (-reserva) + ' de exceso';\n\n    return {\n      // contexto\n      nivel: st.nivel, area: st.area, localidad: st.localidad, cursoEscolar: st.cursoEscolar,\n      onNivel: this.set('nivel'), onArea: this.set('area'), onLocalidad: this.set('localidad'), onCursoEscolar: this.set('cursoEscolar'),\n      areaOpts, areaEsOtra, areaCustom: st.areaCustom, onAreaCustom: this.set('areaCustom'),\n      areaLabel: st.etapa === 'infantil' ? 'Área (Infantil)' : 'Materia (Primaria)',\n      etapaOpts, gestionOpts,\n      // calendario\n      inicio: st.inicio, fin: st.fin, t1Fin: st.t1Fin, t2Fin: st.t2Fin,\n      onInicio: this.set('inicio'), onFin: this.set('fin'), onT1: this.set('t1Fin'), onT2: this.set('t2Fin'),\n      festivosView,\n      addFestivo: () => this.setState(s => ({ festivos: [...s.festivos, { id: this._uid(), label: 'Festivo local', start: s.inicio, end: s.inicio }] })),\n      eventosView,\n      addEvento: () => this.setState(s => ({ eventos: [...s.eventos, { id: this._uid(), date: s.inicio, label: 'Nueva actividad' }] })),\n      // horario\n      weekdays, semanal, duracion: String(st.duracion), onDuracion: this.set('duracion'),\n      // resumen\n      diasLectivos: days.length, teoricas, evSesiones, disponibles,\n      perdidasLabel: descontar ? 'Ses. descontadas' : 'Ses. integradas',\n      // alertas / trimestres\n      alerts, hasAlerts: alerts.length > 0, trimsView,\n      // sdas\n      sdasView, totalSdA,\n      addSda: () => this.setState(s => ({ sdas: [...s.sdas, { id: this._uid(), titulo: 'Nueva situación de aprendizaje', sesiones: 10 }] })),\n      progresoPct, progresoColor, progresoTexto,\n      // normativa + exportación\n      normativaView, onWord, onExcel, onTextoProg, exportStatus: st.exportStatus,\n      // calendario anual + texto\n      showCal, months, calLegend, showTexto, textoProg,\n      onCopy: () => {\n        try { navigator.clipboard.writeText(textoProg); } catch (e) {}\n        this.setState({ copied: true });\n        clearTimeout(this._t);\n        this._t = setTimeout(() => this.setState({ copied: false }), 1600);\n      },\n      copiarLabel: st.copied ? 'Copiado ✓' : 'Copiar texto'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
